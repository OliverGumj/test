name: PR Review
on: [pull_request]
jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Maven
        run: sudo apt-get install -y maven
      - name: Run pr-review
        run: pr-review check --mvn-compile --sonar-scan
      - name: Fail on issues
        if: ${{ steps.review.outcome != 'success' }}
        run: exit 1